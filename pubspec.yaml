name: lumiowalls
description: "New Generation Wallpaper App"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
    

  # UI & Icons
  google_fonts: ^8.0.0
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  
  # Firebase
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2

  
  # Image Handling
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3
  
  # Download & File Management
  dio: ^5.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  
  # Utilities 
  intl: ^0.20.2
  gal: ^2.3.2
  device_info_plus: ^12.3.0
  url_launcher: ^6.3.2
  video_player: ^2.10.1
  flutter_cache_manager: ^3.4.1
  firebase_auth: ^6.1.4
  google_sign_in:
  wallpaper_manager_plus: ^2.0.3
  package_info_plus: ^9.0.0
  image_cropper: ^11.0.0
  cached_video_player_plus: ^4.1.0
  carousel_slider: ^5.1.2
  image: ^4.8.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.2

  # Linting
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/images/logo.png"

  adaptive_icon_background: "assets/images/logo.png"
  adaptive_icon_foreground: "assets/images/logo.png"

  min_sdk_android: 21
  remove_alpha_ios: true

flutter:

  uses-material-design: true

  # Assets
  assets:
    - assets/images/